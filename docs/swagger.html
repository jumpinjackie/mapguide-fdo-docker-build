<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapGuide MapAgent API — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    #swagger-ui .topbar { background-color: #1b6ec2; }
    #swagger-ui .topbar .wrapper { max-width: 100%; padding: 0 20px; }
    #swagger-ui .topbar .download-url-wrapper { display: flex; align-items: center; }
    #swagger-ui .info .title { font-size: 28px; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: "./openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: -1,
        defaultModelExpandDepth: 2,
        docExpansion: "list",
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        tryItOutEnabled: true,
        supportedSubmitMethods: ["get", "post"],
        validatorUrl: null,
        requestInterceptor: (req) => {
          // Strip the #OperationName fragment from the path before sending
          // e.g., /mapagent/mapagent.fcgi#GetSiteVersion?OPERATION=... → /mapagent/mapagent.fcgi?OPERATION=...
          req.url = req.url.replace(/#[^?]*/, '');
          return req;
        }
      });
    };
  </script>
</body>
</html>
