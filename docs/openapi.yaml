openapi: "3.0.3"
info:
  title: MapGuide MapAgent API
  description: |
    HTTP API for MapGuide Open Source, served by the MapAgent FastCGI endpoint.
    
    All operations are dispatched to the single endpoint `/mapguide/mapagent/mapagent.fcgi` using
    the `OPERATION` query parameter. Parameters can be passed via query string (GET) or form body (POST).
    
    **Authentication**: Most operations require either a session token (`SESSION` parameter) or
    HTTP Basic Authentication (`USERNAME` + `PASSWORD`). Create a session with `CREATESESSION` first.
    
    **Response formats**: Operations that return structured data support `FORMAT=text/xml` (default)
    and `FORMAT=application/json`. Version 4.0.0+ with `CLEAN=1` returns direct JSON serialization.
    
    **Source of truth**: This spec is derived from the C++ handler registry in
    `HttpRequest.cpp::InitializeStaticData()`. Operations present in HTML test forms but lacking
    a registered C++ handler (Server Admin, ExecuteSqlQuery, SchemaReport) are intentionally excluded.
  version: "4.0.0"
  contact:
    name: MapGuide Open Source
    url: https://mapguide.osgeo.org
  license:
    name: LGPL-2.1
    url: https://www.gnu.org/licenses/old-licenses/lgpl-2.1.html

servers:
  - url: /mapguide/mapagent/mapagent.fcgi
    description: Relative to the host serving this spec

tags:
  - name: Session
    description: Session lifecycle management
  - name: Site
    description: Server info, users, and groups
  - name: Resource
    description: Repository and resource CRUD, resource data, packages
  - name: Feature
    description: FDO feature source queries, schema discovery, spatial contexts
  - name: Drawing
    description: DWF drawing retrieval, layer/section enumeration
  - name: Mapping
    description: Runtime map creation, plots, legend images
  - name: Rendering
    description: Map images, dynamic overlays, feature queries on rendered maps
  - name: Tile
    description: Tiled map image retrieval and cache management
  - name: KML
    description: KML map and feature layer generation
  - name: CoordinateSystem
    description: CS-Map coordinate system transformations and enumeration
  - name: GeoProcessing
    description: Spatial geometry operations (buffer, distance, etc.)
  - name: WebApplication
    description: Application template, widget, and container enumeration

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: query
      name: SESSION
      description: Session token obtained from CREATESESSION
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication using USERNAME and PASSWORD

  parameters:
    Session:
      name: SESSION
      in: query
      required: false
      description: Session token from CREATESESSION. Required for authenticated operations.
      schema:
        type: string
    Locale:
      name: LOCALE
      in: query
      required: false
      description: Language locale
      schema:
        type: string
        default: "en"
    ClientAgent:
      name: CLIENTAGENT
      in: query
      required: false
      description: Client agent identifier
      schema:
        type: string
    Format:
      name: FORMAT
      in: query
      required: false
      description: Response format for data operations
      schema:
        type: string
        enum: ["text/xml", "application/json"]
        default: "text/xml"
    Clean:
      name: CLEAN
      in: query
      required: false
      description: Request clean/direct JSON serialization (only supported for VERSION > 4.0.0)
      schema:
        type: integer
        enum: [0, 1]
        default: 0
    ImageFormat:
      name: FORMAT
      in: query
      required: false
      description: Output image format
      schema:
        type: string
        enum: ["PNG", "GIF", "JPG", "PNG8", "TIFF"]
        default: "PNG"
    ResourceId:
      name: RESOURCEID
      in: query
      required: true
      description: Resource identifier (e.g. Library://Samples/Sheboygan/Data/Parcels.FeatureSource)
      schema:
        type: string
    MapDefinition:
      name: MAPDEFINITION
      in: query
      required: false
      description: Map definition resource path
      schema:
        type: string
        example: "Library://Samples/Sheboygan/Maps/Sheboygan.MapDefinition"
    MapName:
      name: MAPNAME
      in: query
      required: false
      description: Runtime map name
      schema:
        type: string
    Provider:
      name: PROVIDER
      in: query
      required: true
      description: FDO provider name (e.g. OSGeo.SDF, OSGeo.SHP)
      schema:
        type: string
    ConnectionString:
      name: CONNECTIONSTRING
      in: query
      required: false
      description: FDO connection string
      schema:
        type: string
    Schema:
      name: SCHEMA
      in: query
      required: true
      description: Feature schema name
      schema:
        type: string
    ClassName:
      name: CLASSNAME
      in: query
      required: true
      description: Feature class name
      schema:
        type: string

  responses:
    XmlResponse:
      description: Successful XML response
      content:
        text/xml:
          schema:
            type: string
    JsonResponse:
      description: Successful JSON response
      content:
        application/json:
          schema:
            type: object
    TextResponse:
      description: Successful plain text response
      content:
        text/plain:
          schema:
            type: string
    ImagePngResponse:
      description: PNG image
      content:
        image/png:
          schema:
            type: string
            format: binary
    HtmlResponse:
      description: HTML page
      content:
        text/html:
          schema:
            type: string
    EmptyResponse:
      description: Operation completed successfully (no content)
    UnauthorizedError:
      description: Authentication required
      content:
        text/xml:
          schema:
            type: string
    BadRequestError:
      description: Invalid request parameters

paths:

  # ═══════════════════════════════════════════════════════════════
  # SESSION OPERATIONS
  # ═══════════════════════════════════════════════════════════════

  /mapagent.fcgi#CreateSession:
    post:
      tags: [Session]
      summary: Create a new session
      description: Creates an authenticated session and returns the session ID. No prior authentication required.
      operationId: CreateSession
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [OPERATION, VERSION]
              properties:
                OPERATION:
                  type: string
                  enum: [CREATESESSION]
                  description: Operation name
                VERSION:
                  type: string
                  enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
                  default: "1.0.0"
                  description: API version
                USERNAME:
                  type: string
                  default: Anonymous
                  description: Username (defaults to Anonymous if not provided)
                PASSWORD:
                  type: string
                  description: Password
                LOCALE:
                  type: string
                  description: Locale code (e.g., en)
                CLIENTAGENT:
                  type: string
                  description: Client agent identifier
      responses:
        '200':
          $ref: '#/components/responses/TextResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#GetSessionTimeout:
    get:
      tags: [Session]
      summary: Get session timeout
      description: Returns the configured session timeout value.
      operationId: GetSessionTimeout
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETSESSIONTIMEOUT]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ═══════════════════════════════════════════════════════════════
  # SITE OPERATIONS
  # ═══════════════════════════════════════════════════════════════

  /mapagent.fcgi#GetSiteVersion:
    get:
      tags: [Site]
      summary: Get site version
      description: Returns the MapGuide server version information.
      operationId: GetSiteVersion
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETSITEVERSION]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#GetSiteInfo:
    get:
      tags: [Site]
      summary: Get site information
      description: Returns site configuration and status information.
      operationId: GetSiteInfo
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETSITEINFO]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#GetSiteStatus:
    get:
      tags: [Site]
      summary: Get site status
      description: Returns current site operational status. No authentication required.
      operationId: GetSiteStatus
      security: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETSITESTATUS]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'

  /mapagent.fcgi#EnumerateUsers:
    get:
      tags: [Site]
      summary: Enumerate users
      description: Lists users, optionally filtered by group.
      operationId: EnumerateUsers
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [ENUMERATEUSERS]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
        - name: GROUP
          in: query
          required: false
          description: Filter users by group name
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#EnumerateGroups:
    get:
      tags: [Site]
      summary: Enumerate groups
      description: Lists all user groups.
      operationId: EnumerateGroups
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [ENUMERATEGROUPS]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ═══════════════════════════════════════════════════════════════
  # RESOURCE OPERATIONS — Repositories
  # ═══════════════════════════════════════════════════════════════

  /mapagent.fcgi#EnumerateRepositories:
    get:
      tags: [Resource]
      summary: Enumerate repositories
      description: Lists available repositories, optionally filtered by type.
      operationId: EnumerateRepositories
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [ENUMERATEREPOSITORIES]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
        - name: TYPE
          in: query
          required: false
          description: Repository type filter
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#CreateRepository:
    post:
      tags: [Resource]
      summary: Create repository
      description: Creates a new repository.
      operationId: CreateRepository
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [CREATEREPOSITORY]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/ResourceId'
        - name: TYPE
          in: query
          required: false
          description: Repository type
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/EmptyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#DeleteRepository:
    post:
      tags: [Resource]
      summary: Delete repository
      description: Deletes an existing repository.
      operationId: DeleteRepository
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [DELETEREPOSITORY]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/EmptyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#UpdateRepository:
    post:
      tags: [Resource]
      summary: Update repository
      description: Updates repository content and/or header.
      operationId: UpdateRepository
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [UPDATEREPOSITORY]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/ResourceId'
        - name: CONTENT
          in: query
          required: false
          description: Repository content XML
          schema:
            type: string
        - name: HEADER
          in: query
          required: false
          description: Repository header XML
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/EmptyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#GetRepositoryContent:
    get:
      tags: [Resource]
      summary: Get repository content
      description: Returns the content of a repository.
      operationId: GetRepositoryContent
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETREPOSITORYCONTENT]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#GetRepositoryHeader:
    get:
      tags: [Resource]
      summary: Get repository header
      description: Returns the header/metadata of a repository.
      operationId: GetRepositoryHeader
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [GETREPOSITORYHEADER]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ═══════════════════════════════════════════════════════════════
  # RESOURCE OPERATIONS — Resources
  # ═══════════════════════════════════════════════════════════════

  /mapagent.fcgi#EnumerateResources:
    get:
      tags: [Resource]
      summary: Enumerate resources
      description: Lists resources under a given path, with optional depth, type, and filter.
      operationId: EnumerateResources
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [ENUMERATERESOURCES]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/Format'
        - $ref: "#/components/parameters/Clean"
        - name: RESOURCEID
          in: query
          required: true
          description: Parent resource path
          schema:
            type: string
        - name: DEPTH
          in: query
          required: false
          description: Recursion depth (-1 for infinite)
          schema:
            type: integer
            default: 1
        - name: TYPE
          in: query
          required: false
          description: Resource type filter
          schema:
            type: string
        - name: COMPUTECHILDREN
          in: query
          required: false
          description: Whether to compute child counts
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: FILTER
          in: query
          required: false
          description: Name filter pattern
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/XmlResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#ResourceExists:
    get:
      tags: [Resource]
      summary: Check if resource exists
      description: Returns "true" or "false" as plain text.
      operationId: ResourceExists
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [RESOURCEEXISTS]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/TextResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#SetResource:
    post:
      tags: [Resource]
      summary: Set/update resource
      description: Creates or updates a resource with XML content and optional header.
      operationId: SetResource
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [SETRESOURCE]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Session'
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
        - $ref: '#/components/parameters/ResourceId'
        - name: CONTENT
          in: query
          required: true
          description: Resource content XML
          schema:
            type: string
        - name: HEADER
          in: query
          required: false
          description: Resource header XML
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/EmptyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /mapagent.fcgi#DeleteResource:
    post:
      tags: [Resource]
      summary: Delete resource
      description: Deletes an existing resource.
      operationId: DeleteResource
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
