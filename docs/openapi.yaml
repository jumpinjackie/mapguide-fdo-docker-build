  /mapagent.fcgi#ApplyResourcePackage:
    post:
      tags: [Resource]
      summary: Apply resource package
      description: Uploads and applies a MapGuide Package (.mgp) file.
      operationId: ApplyResourcePackage
      security:
        - SessionAuth: []
        - BasicAuth: []
      parameters:
        - name: OPERATION
          in: query
          required: true
          description: Operation name
          schema:
            type: string
            enum: [APPLYRESOURCEPACKAGE]
        - name: VERSION
          in: query
          required: true
          description: API version
          schema:
            type: string
            enum: ["1.0.0", "1.2.0", "2.0.0", "2.2.0", "4.0.0"]
            default: "1.0.0"
        - $ref: '#/components/parameters/Locale'
        - $ref: '#/components/parameters/ClientAgent'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [OPERATION, VERSION, PACKAGE]
              properties:
                OPERATION:
                  type: string
                  enum: [APPLYRESOURCEPACKAGE]
                VERSION:
                  type: string
                SESSION:
                  type: string
                USERNAME:
                  type: string
                PASSWORD:
                  type: string
                LOCALE:
                  type: string
                CLIENTAGENT:
                  type: string
                MAX_FILE_SIZE:
                  type: integer
                  description: Maximum allowed file size in bytes
                PACKAGE:
                  type: string
                  format: binary
                  description: The .mgp package file to upload
      responses:
        '200':
          $ref: '#/components/responses/EmptyResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

